name: test

# Run the unit suite + ruff on every push/PR across the three
# platforms we promise to support. Windows is non-negotiable —
# the browser-triggered backfill subprocess and the port-busy
# error messages are platform-conditional and only catch
# regressions when both branches are exercised in CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
      - name: Set up Python 3.13
        run: uv python install 3.13
      - name: Sync deps
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check
      - name: Unit tests
        run: uv run pytest -q
